<style>
*{
    margin:0;
    padding:0;
}

body{
    background-image:url(img/fondo3.jpg);
    background-size:cover;
}

h1{
    text-align:center;
    color:white;
    font-size:50px;
}

#texto{
    color:white;
    text-align:center;
    font-size:25px;
    margin-top:10px;
}

a{
    color:white;
}

a:hover{
    color:red;
}

.contenedor{
    width:400px;
    height:250px;

    margin:auto;
    margin-top:50px;

    overflow:hidden;
    position:relative;

    background:url("img/espacio.jpg") repeat;

    animation:fondo 5s linear infinite;
}

@keyframes fondo{
    from{
        background-position:0 0;
    }
    to{
        background-position:-500px 0;
    }
}

#cohete{
    width:100px;

    position:absolute;
    top:80px;

    animation:mover 4s linear infinite;
}

@keyframes mover{
    from{
        left:-120px;
    }

    to{
        left:500px;
    }
}

#cohete img{
    width:100%;
}
ol {
    display: flex;
    margin-top: 20px;
}
li {
    margin: 0 auto;
    display: flex;
}
.menu a {
    color: aliceblue;
}
.menu a:hover{
    color: brown;
    }
.submenu{
    position: relative;
    padding-bottom: 10px;

}
.desplegable{
    display: none;
    width: 180px;
    background-color: transparent;
    top: 20px;
    left: 0px;
    position: absolute;
    list-style: none;
    padding: 0;
    z-index: 999;
}
.desplegable li{
    width: 100%;
}
.desplegable a{
    padding: 10px;
    color: white;
    text-decoration: none;
}
.desplegable a:hover{
    background-color: blue;
}
.submenu:hover .desplegable{
    display: block;
}
</style>
