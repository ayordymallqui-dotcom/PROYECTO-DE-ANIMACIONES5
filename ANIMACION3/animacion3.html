<html>
<head>
    <title>ANIMACION CS3</title>
        <style>
        *{
            margin:0px;
            padding:0px;
        }
        body{
            background-image: url(img/fondo3.png);
            background-size: cover;
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative;/*provoca el centrado con div*/
            margin: 0 auto; /*centrado del contenedor*/
            margin-top: 50px;
            overflow: hidden;
            background-image: url("./img/campo.avif");
            background-size: cover;
            
        }
        .cuadrito{
            width: 50px; /*dimension del cuadro*/
            height: 50px;
            position: absolute; /*interno*/
            left: -50px;
            top: 50px;
            animation: cuadrito 5s infinite;

        }
        @keyframes cuadrito{
            0%{
                left: -50px;
                top: 150px;
                rotate:0deg;
            }
            50%{
                left: 150;
                top: 0px;
                rotate:60deg;

            }
            100%{
                left: 400;
                top: 150px;
                rotate:0deg;
            }

        }
        .cuadrito img{
            width: 50px;
            height: 50px;
        }
        h1{
            text-align: center;
            color: aliceblue;
            margin:0 auto;
            font-size: 50px;
        }
        #texto{
            color: white;
            text-align: center;
            font-size: 25px;
            margin-top: 10px;
        }
        a:hover {
            color:rgb(255, 0, 0);
        }
        a {
            color: aliceblue;
        }
        ol {
            display: flex;
            margin-top: 20px;
        }
        li {
            margin: 0 auto;
            display: flex;
        }
        .menu a {
            color: aliceblue;
        }
        .menu a:hover{
            color: brown;
        }
        .submenu{
            position: relative;
            padding-bottom: 10px;

        }
        .desplegable{
            display: none;
            width: 180px;
            background-color: transparent;
            top: 20px;
            left: 0px;
            position: absolute;
            list-style: none;
            padding: 0;
            z-index: 999;
        }
        .desplegable li{
            width: 100%;
        }
        .desplegable a{
            padding: 10px;
            color: white;
            text-decoration: none;
        }
        .desplegable a:hover{
            background-color: blue;
        }
        .submenu:hover .desplegable{
            display: block;
        }
        </style>
</head>
