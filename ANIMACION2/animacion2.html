<html>
<head>
    <title></title>
    <style>
    *{
        margin:0;
        padding:0;
    }
    body{
        background-image: url(img/fondo2.jpg);
        background-size: cover;
    }
    #contenedor{
        width: 400px;
        height: 200px;
        background-image: url(img/mapa.jpg);
        background-size: cover;
        border: 1px solid black;
        position:relative;
        margin:0 auto; /*centrar el contenedor*/
        overflow: hidden; /*oculta todo lo que contiene*/
    }
    #cuadrito{
        width: 100px;
        height: 100px;
        position: absolute; /*Obligatorio para mover el div*/
        top:105px;
        left:-100px;

        animation: cuadrito 3s infinite;
        animation-timing-function: linear; /*define la forma de moverse*/
    }
    @keyframes cuadrito{
        from{
            left:-100px;
        }
        to{
            left:500px;
        }
    }

    #cuadrito img{
        width: 100px;
        height: 100px;
    }
    h1 {
        text-align: center;
        color: aliceblue;
        margin:0 auto;
        font-size: 50px;

    }
    #texto{
        color: white;
        text-align: center;
        font-size: 25px;
        margin-top: 10px;
    }
    a:hover {
        color:rgb(255, 0, 0);
    }
    a {
        color: aliceblue;
    }
    ol {
        display: flex;
        margin-top: 20px;
    }
    li {
        margin: 0 auto;
        display: flex;
    }
    .menu a {
        color: aliceblue;
    }
    .menu a:hover{
        color: brown;
    }
    .submenu{
        position: relative;
        padding-bottom: 10px;

    }
    .desplegable{
        display: none;
        width: 180px;
        background-color: transparent;
        top: 20px;
        left: 0px;
        position: absolute;
        list-style: none;
        padding: 0;
        z-index: 999;
    }
    .desplegable li{
        width: 100%;
    }
    .desplegable a{
        padding: 10px;
        color: white;
        text-decoration: none;
    }
    .desplegable a:hover{
        background-color: blue;
    }
    .submenu:hover .desplegable{
        display: block;
    }
    </style>
</head>
