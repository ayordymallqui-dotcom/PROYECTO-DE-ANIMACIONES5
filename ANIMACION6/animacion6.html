    <title>CLIP PATH</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        body{
            background-image: url(img/fondo6.png);
            background-size: cover;
        }
        .contenedorpadre{
            display: flex;
        }
        .contenedor {
            width: 400px;
            height: 500px;
            background-color: transparent;
            position: relative;
            overflow: hidden;
            margin-left: 220px;
        }
        .gorrito {
            width: 100px;
            height: 100px;
            background-image: url(img/gorrito.jpg);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);;
            position: absolute;
            left: 150px;
            top: 100px;
        }
        .cabeza {
            width: 100px;
            height: 100px;
            background-image: url(img/cara.jpg);
            background-size: cover;
            clip-path: circle(50.0% at 50% 50%);
            position: absolute;
            left: 150px;
            top: 200px;
        }
        .cuerpo {
            width: 150px;
            height: 150px;
            background-image: url(img/cuerpomuzculoso.png);
            background-size: cover;
            background-position: center;
            clip-path: polygon(24% 21%, 77% 21%, 100% 50%, 81% 74%, 20% 74%, 0% 50%);
            position: absolute;
            left: 124px;
            top: 255px;
        }
        .pieD {
            width: 80px;
            height: 80px;
            background-color: blue;
            clip-path: ellipse(28% 16% at 52% 52%);
            position: absolute;
            left: 130px;
            top: 360px;
        }
        .pieI {
            width: 80px;
            height: 80px;
            background-color: blue;
            clip-path: ellipse(28% 16% at 52% 52%);
            position: absolute;
            left: 185px;
            top: 360px;
        }
        .piernaD {
            width: 60px;
            height: 60px;
            background-image: url(img/cuerpo1.jpg);
            clip-path: inset(9% 34% 11% 18%);
            position: absolute;
            left: 160px;
            top: 335px;
        }
        .piernaI {
            width: 60px;
            height: 60px;
            background-image: url(img/cuerpo1.jpg);
