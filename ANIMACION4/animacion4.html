<html>
<head>
<title>TURISMO PERÚ</title>
<style>
*{
    padding:0px;
    margin:0px;
}
body{
    background-image: url(img/fondo4.png);
    background-size: cover;
}
.contenedor{
    width: 800px;
    height:300px;
    border:1px solid black;
    margin:0 auto;
    position: relative;
    overflow: hidden;
}
.tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4{
    width:200px;
    height:300px;
    position: absolute;
    top: -300px;
    background-size: cover;
}
.tarjeta1{
    background-image: url(img/mar.jpg);
    left:0px;
    animation: tarjeta1 3s 1 forwards;
    
}
.tarjeta2{
    background-image: url(img/costa.jpg);
    left:200px;
    top: -300px;
    animation: tarjeta1 3s 1 forwards 3s;
}
.tarjeta3{
    background-image: url(img/selva.jpg);
    left:400px;
    animation: tarjeta1 3s 1 forwards 6s;
}
.tarjeta4{
    background-image: url(img/sierra.jpg);
    left:600px;
    animation: tarjeta1 3s 1 forwards 9s;
}


/*LAS RICAS ANIMACIONES*/
@keyframes tarjeta1{
    0%{
        top:-300px;
        transform: rotateY(180deg);
    }
    50%{
        top:300px;
    }
    100%{
        top:0px;
        
    }
}
@keyframes mostrartitulo {
    0%  { 
        opacity: 0; 
    }
    100% { 
        opacity: 1; 
    }

}
.titulo{
    width: 800px;
    height: 30px;
    background-color: rgba(0, 0, 0, 0.45);
    position: absolute;
    bottom: 0px;
    left: 0px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    opacity: 0;
    animation: mostrartitulo 1s forwards 12s;

}
.titulo h1{
    color: yellow;
    font-family: sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    
}
/*eventos*/
.tarjeta1:hover{
    transition: 1s;
    scale: 1.1;
    z-index: 1;
}
.tarjeta2:hover{
    transition: 1s;
    scale: 1.1;
    z-index: 1;
}
.tarjeta3:hover{
    transition: 1s;
    scale: 1.1;
    z-index: 1;
}
.tarjeta4:hover{
    transition: 1s;
    scale: 1.1;
    z-index: 1;
}
h1 {
    text-align: center;
    color: aliceblue;
    margin:0 auto;
    font-size: 50px;

}
#texto{
    color: white;
    text-align: center;
    font-size: 25px;
    margin-top: 10px;
}
a:hover {
    color:rgb(255, 0, 0);
}
a {
    color: aliceblue;
}
ol {
    display: flex;
    margin-top: 20px;
}
li {
    margin: 0 auto;
    display: flex;
}
.menu a {
    color: aliceblue;
}
.menu a:hover{
    color: brown;
    }
.submenu{
    position: relative;
    padding-bottom: 10px;

}
.desplegable{
    display: none;
    width: 180px;
    background-color: transparent;
    top: 20px;
    left: 0px;
    position: absolute;
    list-style: none;
    padding: 0;
    z-index: 999;
}
.desplegable li{
    width: 100%;
}
.desplegable a{
    padding: 10px;
    color: white;
    text-decoration: none;
}
.desplegable a:hover{
    background-color: blue;
}
.submenu:hover .desplegable{
    display: block;
}
</style>
